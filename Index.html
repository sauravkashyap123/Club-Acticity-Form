<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Club Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1c1c1c;
    --accent: #e8c96d;
    --accent2: #c9432a;
    --text: #f0ece0;
    --muted: #7a7570;
    --border: #2e2b26;
    --success: #4caf50;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(232,201,109,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(201,67,42,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 24px 16px;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(232,201,109,0.3);
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 18px;
    background: rgba(232,201,109,0.05);
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  /* Seats indicator */
  .seats-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .seats-bar .label { font-size: 12px; color: var(--muted); flex: 1; }
  .seats-bar .count { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); font-weight: 700; }
  .progress-track {
    flex: 2;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 999px;
    transition: width 0.5s ease;
  }

  /* Form card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }

  .field {
    margin-bottom: 22px;
    animation: fadeUp 0.6s ease both;
  }
  .field:nth-child(1) { animation-delay: 0.1s; }
  .field:nth-child(2) { animation-delay: 0.2s; }
  .field:nth-child(3) { animation-delay: 0.3s; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    appearance: none;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--muted); }
  input:focus, select:focus {
    border-color: rgba(232,201,109,0.5);
    box-shadow: 0 0 0 3px rgba(232,201,109,0.08);
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
    font-size: 14px;
  }
  select option { background: #1c1c1c; }

  /* Club cards */
  .club-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 4px;
  }
  .club-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    user-select: none;
  }
  .club-card:hover { border-color: var(--muted); transform: translateY(-2px); }
  .club-card.selected {
    border-color: var(--accent);
    background: rgba(232,201,109,0.06);
    box-shadow: 0 0 0 3px rgba(232,201,109,0.08);
  }
  .club-card .icon { font-size: 28px; }
  .club-card .name { font-size: 12px; font-weight: 500; text-align: center; color: var(--text); }
  .club-card.selected .name { color: var(--accent); }
  input[type="radio"].hidden { display: none; }

  /* Submit */
  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    color: #0d0d0d;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--accent2); }
  .toast .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .toast.error .dot { background: var(--accent2); }

  /* Full notice */
  .full-notice {
    text-align: center;
    padding: 32px;
    color: var(--muted);
  }
  .full-notice .emoji { font-size: 48px; margin-bottom: 12px; }
  .full-notice strong { display: block; font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 6px; }

  .admin-link {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
  }
  .admin-link a {
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 1px;
  }
  .admin-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="noise"></div>

<div class="wrapper">
  <div class="header">
    <div class="badge">Cultural Fest 2025</div>
    <h1>Club Registration</h1>
    <p class="subtitle">Secure your spot in our performing arts clubs</p>
  </div>

  <div class="seats-bar">
    <div class="label">Seats Remaining</div>
    <div class="count" id="seatCount">27</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="card" id="formCard">
    <form id="regForm">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" autocomplete="off" required />
      </div>

      <div class="field">
        <label for="rollno">Roll Number</label>
        <input type="text" id="rollno" placeholder="e.g. 2025CS001" autocomplete="off" required />
      </div>

      <div class="field">
        <label>Select Club</label>
        <div class="club-options">
          <label class="club-card" id="card-nagpuri" onclick="selectClub('Nagpuri Dance Club', this)">
            <input type="radio" name="club" value="Nagpuri Dance Club" class="hidden" />
            <span class="icon">🥁</span>
            <span class="name">Nagpuri Dance Club</span>
          </label>
          <label class="club-card" id="card-music" onclick="selectClub('Music Club', this)">
            <input type="radio" name="club" value="Music Club" class="hidden" />
            <span class="icon">🎵</span>
            <span class="name">Music Club</span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Register Now</button>
    </form>
  </div>

  <div class="admin-link">
    <a href="admin.html">Admin Dashboard →</a>
  </div>
</div>

<div class="toast" id="toast">
  <div class="dot"></div>
  <span id="toastMsg">Registered successfully!</span>
</div>

<script>
  const MAX = 27;
  let selectedClub = '';

  function getData() {
    return JSON.parse(localStorage.getItem('clubRegistrations') || '[]');
  }
  function saveData(arr) {
    localStorage.setItem('clubRegistrations', JSON.stringify(arr));
  }

  function updateSeats() {
    const used = getData().length;
    const remaining = MAX - used;
    document.getElementById('seatCount').textContent = remaining;
    const pct = (used / MAX) * 100;
    document.getElementById('progressFill').style.width = pct + '%';

    if (remaining <= 0) {
      document.getElementById('formCard').innerHTML = `
        <div class="full-notice">
          <div class="emoji">🎭</div>
          <strong>Registration Closed</strong>
          All 27 seats have been filled. Thank you for your interest!
        </div>`;
    }
  }

  function selectClub(club, el) {
    selectedClub = club;
    document.querySelectorAll('.club-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    const m = document.getElementById('toastMsg');
    m.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('regForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const rollno = document.getElementById('rollno').value.trim();

    if (!name || !rollno || !selectedClub) {
      showToast('Please fill all fields and select a club.', true);
      return;
    }

    const data = getData();
    if (data.length >= MAX) {
      showToast('Registration is full!', true);
      updateSeats();
      return;
    }

    // Check duplicate roll no
    if (data.find(d => d.rollno.toLowerCase() === rollno.toLowerCase())) {
      showToast('This Roll No is already registered!', true);
      return;
    }

    data.push({
      id: Date.now(),
      name,
      rollno,
      club: selectedClub,
      timestamp: new Date().toISOString()
    });
    saveData(data);

    showToast(`Welcome, ${name}! You're registered ✓`);
    this.reset();
    selectedClub = '';
    document.querySelectorAll('.club-card').forEach(c => c.classList.remove('selected'));
    updateSeats();
  });

  updateSeats();
</script>
</body>
</html>
